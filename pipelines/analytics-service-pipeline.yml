trigger:
  branches:
    include: [main]
  paths:
    include:
      - src/services/TinyUrl.AnalyticsService/**
      - src/shared/**

variables:
  - group: tinyurl-azure-vars
  - name: serviceName
    value: analytics-service
  - name: imageRepository
    value: tinyurl/analytics-service
  - name: vmImageName
    value: ubuntu-latest

stages:
- stage: Build
  jobs:
  - job: Build
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: UseDotNet@2
      inputs: { version: 9.x }
    - task: DotNetCoreCLI@2
      inputs: { command: restore, projects: TinyUrl.Microservices.sln }
    - task: DotNetCoreCLI@2
      inputs:
        command: build
        projects: TinyUrl.Microservices.sln
        arguments: --configuration Release --no-restore
    - task: DotNetCoreCLI@2
      inputs:
        command: test
        projects: '**/*.Tests.csproj'
        arguments: --configuration Release --no-build
    - script: |
        dotnet tool install --global security-scan
        security-scan TinyUrl.Microservices.sln --no-banner
      displayName: SAST Security Scan

- stage: Containerize
  dependsOn: Build
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - job: Docker
    pool:
      vmImage: $(vmImageName)
    steps:
    - task: AzureCLI@2
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: az acr login --name $(acrName)
    - task: Docker@2
      inputs:
        containerRegistry: $(acrServiceConnection)
        repository: $(imageRepository)
        command: buildAndPush
        dockerfile: src/services/TinyUrl.AnalyticsService/TinyUrl.AnalyticsService.Api/Dockerfile
        buildContext: .
        tags: |
          $(Build.BuildId)
          latest
    - task: AzureCLI@2
      displayName: Trivy scan
      inputs:
        azureSubscription: $(azureServiceConnection)
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          docker run --rm -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy image --exit-code 1 --severity HIGH,CRITICAL \
            $(acrName).azurecr.io/$(imageRepository):$(Build.BuildId)

- stage: DeployDev
  dependsOn: Containerize
  jobs:
  - deployment: Deploy
    environment: dev
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az aks get-credentials --resource-group $(resourceGroup)-dev --name $(aksClusterName)-dev
          - task: KubernetesManifest@1
            inputs:
              action: deploy
              namespace: tinyurl-dev
              manifests: |
                deploy/k8s/analytics-service/deployment.yml
                deploy/k8s/analytics-service/service.yml
              containers: $(acrName).azurecr.io/$(imageRepository):$(Build.BuildId)

- stage: DeployProd
  dependsOn: DeployDev
  jobs:
  - deployment: Deploy
    environment: prod
    pool:
      vmImage: $(vmImageName)
    strategy:
      runOnce:
        deploy:
          steps:
          - task: AzureCLI@2
            inputs:
              azureSubscription: $(azureServiceConnection)
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: az aks get-credentials --resource-group $(resourceGroup)-prod --name $(aksClusterName)-prod
          - task: KubernetesManifest@1
            inputs:
              action: deploy
              namespace: tinyurl-prod
              strategy: blueGreen
              manifests: |
                deploy/k8s/analytics-service/deployment.yml
                deploy/k8s/analytics-service/service.yml
              containers: $(acrName).azurecr.io/$(imageRepository):$(Build.BuildId)
