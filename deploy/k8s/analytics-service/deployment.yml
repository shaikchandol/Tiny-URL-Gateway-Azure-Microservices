apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: tinyurl-prod
  labels:
    app: analytics-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
      annotations:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: analytics-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
      containers:
      - name: analytics-service
        image: tinyurlacr.azurecr.io/tinyurl/analytics-service:latest
        ports:
        - containerPort: 8080
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: OTEL_SERVICE_NAME
          value: analytics-service
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
