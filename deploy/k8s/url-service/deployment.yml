apiVersion: apps/v1
kind: Deployment
metadata:
  name: url-service
  namespace: tinyurl-prod
  labels:
    app: url-service
    version: v1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: url-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: url-service
        version: v1
      annotations:
        azure.workload.identity/use: "true"
    spec:
      serviceAccountName: url-service-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 2000
      containers:
      - name: url-service
        image: tinyurlacr.azurecr.io/tinyurl/url-service:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: ASPNETCORE_ENVIRONMENT
          value: Production
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: http://otel-collector:4317
        - name: OTEL_SERVICE_NAME
          value: url-service
        - name: Azure__ServiceBus__Namespace
          valueFrom:
            secretKeyRef:
              name: azure-servicebus-secret
              key: namespace
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        livenessProbe:
          httpGet:
            path: /health/live
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: DoNotSchedule
        labelSelector:
          matchLabels:
            app: url-service
