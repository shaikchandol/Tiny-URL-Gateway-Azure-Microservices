apiVersion: v1
kind: Namespace
metadata:
  name: tinyurl-prod
  labels:
    environment: production
    team: platform
---
apiVersion: v1
kind: Namespace
metadata:
  name: tinyurl-dev
  labels:
    environment: development
    team: platform
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-all-ingress
  namespace: tinyurl-prod
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal
  namespace: tinyurl-prod
spec:
  podSelector: {}
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: tinyurl-prod
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: tinyurl-prod
  - to: []
    ports:
    - port: 443
    - port: 5671
    - port: 5432
    - port: 6380
